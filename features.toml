[[feature]]
id = "feature/sim-web/stateful-tree-scenes"
title = "Stateful tree scenes"
summary = "Render expandable Scene outlines with explicit disclosure state and total budgets for nodes, depth, encoded bytes, and visible faces."
owner = "crate/sim-lib-scene"
audiences = ["code", "framework"]
guidance = "Use this row when a view needs a bounded outline instead of a product-specific tree widget or an unbounded recursive Scene."
claims_anchors = [
  "anchor/crate/sim-lib-scene",
  "anchor/crate/sim-lib-view",
  "anchor/crate/sim-web-shell",
]
claims_specimens = [
