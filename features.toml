[[route]]
id = "route/expose-view-surface"
task = "Expose a view surface"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-web/view-surface", why = "The sim-lib-view row owns the default view and reversible edit surfaces." },
  { feature = "feature/sim-web/codec-surface-sessions", why = "The bridge session consumes one SurfaceCodec for encode, decode, commit, projection, and isolated pane state." },
  { feature = "feature/sim-web/device-surfaces", why = "Device profiles show how projection adapts to concrete surface caps." },
  { feature = "feature/sim-web/web-shell-host", why = "The web shell row shows how a browser host loads those surfaces." },
]

[[route]]
id = "route/add-server-backed-web-session"
task = "Add a server-backed web session"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-web/codec-surface-sessions", why = "The bridge session owns reversible surface encode, decode, commit, and pane isolation." },
  { feature = "feature/sim-web/server-backed-web-sessions", why = "RemoteTransport composes that session with sim-lib-server transport negotiation and eval request frames." },
  { specimen = "spec-test/sim-web/crates/sim-lib-web-bridge/src/remote_tests", why = "The remote transport test performs real in-process server round trips, reconnect, close, and stale-revision failure." },
]

[[route]]
id = "route/open-web-workspace"
task = "Open a web workspace"
audiences = ["user"]
steps = [
  { feature = "feature/sim-web/web-shell-host", why = "The web shell row owns the serve, browse, and atelier commands." },
  { feature = "feature/sim-web/view-surface", why = "The view row supplies the reversible surfaces shown by the browser host." },
  { specimen = "recipe/sim-web/crates/sim-web-shell/01-basics/open-workspace", why = "The open-workspace recipe is the shortest browser-host example." },
]
