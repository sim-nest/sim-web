[[feature]]
id = "feature/sim-web/codec-surface-sessions"
title = "Surface codec sessions"
summary = "Drive browser and server sessions through one reversible SurfaceCodec contract for encode, decode, commit, projection, and isolation."
owner = "crate/sim-lib-web-bridge"
audiences = ["code", "framework"]
guidance = "Use this row when a server or browser session needs the canonical reversible SurfaceCodec bridge instead of separate view and editor protocol ownership."
claims_anchors = [
  "anchor/crate/sim-lib-view",
  "anchor/crate/sim-lib-web-bridge",
  "anchor/export/sim-lib-view/surface-default",
]
claims_surfaces = [
  "view-edit/sim-lib-web-bridge",
]
claims_specimens = [
  "spec-test/sim-web/crates/sim-lib-web-bridge/src/surface_session_tests",
]
supports = [
  "feature/sim-web/view-surface",
  "feature/sim-web/device-surfaces",
]

[[feature]]
id = "feature/sim-web/server-backed-web-sessions"
title = "Server-backed web sessions"
summary = "Connect RemoteTransport to the existing SIM server transport so browser sessions read, commit, drain changes, reconnect, and report revision conflicts through ordinary server eval requests."
owner = "crate/sim-lib-web-bridge"
audiences = ["code", "framework"]
guidance = "Use this row when a browser or wasm host needs the canonical web Session bridge backed by sim-lib-server rather than an in-memory fixture or local fabric."
claims_anchors = [
  "anchor/crate/sim-lib-web-bridge",
]
claims_surfaces = [
  "view-edit/sim-lib-web-bridge",
]
claims_specimens = [
  "spec-test/sim-web/crates/sim-lib-web-bridge/src/remote_tests",
]
supports = [
  "feature/sim-web/codec-surface-sessions",
]

